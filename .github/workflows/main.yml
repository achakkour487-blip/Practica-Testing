name: Sudoku CI Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar
        run: mvn clean compile

      - name: Ejecutar Unit Tests y E2E
        # xvfb-run simula una pantalla en GitHub para que JavaFX pueda abrirse sin dar error
        run: xvfb-run mvn test
  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue simulado
        run: |
          echo "Simulando despliegue de la app JavaFX externa."
          echo "Despliegue exitoso."
